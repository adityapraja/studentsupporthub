<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Support Hub - Verify OTP</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card" style="text-align: center;">
      <h1>Student Support Hub</h1>
      <h2 style="font-size: 22px; font-weight: 800; margin-bottom: 8px;">Enter OTP</h2>

      <div id="otp-alert"></div>

      <div class="otp-container" id="otp-container">
        <input type="text" maxlength="1" class="otp-digit" data-index="0" autofocus>
        <input type="text" maxlength="1" class="otp-digit" data-index="1">
        <input type="text" maxlength="1" class="otp-digit" data-index="2">
        <input type="text" maxlength="1" class="otp-digit" data-index="3">
        <input type="text" maxlength="1" class="otp-digit" data-index="4">
        <input type="text" maxlength="1" class="otp-digit" data-index="5">
      </div>

      <button class="btn btn-primary btn-block btn-lg" id="btn-verify" onclick="handleVerifyOTP()">VERIFY</button>

      <div class="otp-timer" id="otp-timer">
        Didn't receive OTP? You can request again in <strong id="countdown">30</strong> seconds
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
