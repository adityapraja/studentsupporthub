<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Support Hub - Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">STUDENT SUPPORT HUB</div>
    <div class="navbar-links">
      <a href="/student-dashboard" class="active">Home</a>
      <a href="/alumni">Alumni</a>
      <a href="/grievances">Grievances</a>
      <a href="/notes">Notes</a>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </nav>

  <!-- Welcome Section -->
  <div class="dashboard-hero">
    <h1>HELLO, <span id="user-name">...</span>!</h1>
    <div class="user-meta"><span id="user-branch">...</span>, Semester <span id="user-semester">...</span>, ID: <span id="user-college-id">...</span></div>
  </div>

  <!-- Icon Cards -->
  <div class="icon-cards">
    <a href="/grievances" class="icon-card">
      <span class="card-icon">
        <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3">
          <rect x="20" y="10" width="60" height="80" rx="4"/>
          <circle cx="50" cy="35" r="12"/>
          <line x1="35" y1="55" x2="65" y2="55"/>
          <line x1="35" y1="65" x2="65" y2="65"/>
          <line x1="35" y1="75" x2="55" y2="75"/>
          <rect x="30" y="5" width="15" height="10" rx="2"/>
          <circle cx="37" cy="10" r="3" fill="currentColor"/>
        </svg>
      </span>
      <h3>Grievances</h3>
    </a>
    <a href="/notes" class="icon-card">
      <span class="card-icon">
        <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3">
          <rect x="22" y="15" width="56" height="75" rx="4"/>
          <line x1="35" y1="45" x2="65" y2="45"/>
          <line x1="35" y1="58" x2="65" y2="58"/>
          <circle cx="33" cy="10" r="5" fill="currentColor"/>
          <circle cx="50" cy="10" r="5" fill="currentColor"/>
          <circle cx="67" cy="10" r="5" fill="currentColor"/>
        </svg>
      </span>
      <h3>Notes</h3>
    </a>
    <a href="/alumni" class="icon-card">
      <span class="card-icon">
        <svg viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="3">
          <circle cx="35" cy="30" r="12"/>
          <path d="M15 70 Q15 50 35 50 Q55 50 55 70"/>
          <circle cx="65" cy="30" r="10"/>
          <path d="M50 65 Q50 48 65 48 Q80 48 80 65"/>
        </svg>
      </span>
      <h3>Alumni</h3>
    </a>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
