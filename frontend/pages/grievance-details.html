<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Support Hub - Grievance Details</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">STUDENT SUPPORT HUB</div>
    <div class="navbar-links">
      <a href="/student-dashboard">Home</a>
      <a href="/alumni">Alumni</a>
      <a href="/grievances" class="active">Grievances</a>
      <a href="/notes">Notes</a>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </nav>

  <div class="page-content">
    <button class="btn btn-back" onclick="window.location.href='/grievances'" style="margin-bottom: 20px;">← Back</button>

    <!-- Grievance Detail Card -->
    <div class="grievance-detail-card" id="grievance-detail">
      <div style="text-align:center;padding:20px;"><div class="spinner"></div></div>
    </div>

    <!-- Replies Section -->
    <div class="replies-section">
      <h3>Replies:</h3>
      <div id="replies-list">
        <div class="empty-state"><p>No replies yet.</p></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
