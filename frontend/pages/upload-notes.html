<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Support Hub - Upload Notes</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">STUDENT SUPPORT HUB</div>
    <div class="navbar-links">
      <a href="/student-dashboard">Home</a>
      <a href="/alumni">Alumni</a>
      <a href="/grievances">Grievances</a>
      <a href="/notes" class="active">Notes</a>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </nav>

  <div class="page-content">
    <div class="page-header">
      <h1>Upload Notes</h1>
    </div>

    <div id="upload-alert"></div>

    <form class="upload-form" id="upload-form" onsubmit="handleUploadNote(event)">
      <div class="form-group">
        <label for="note-title">Title</label>
        <input type="text" id="note-title" placeholder="Enter note title" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="note-subject">Subject</label>
          <input type="text" id="note-subject" placeholder="e.g. Computer Science" required>
        </div>
        <div class="form-group">
          <label for="note-semester">Semester</label>
          <select id="note-semester">
            <option value="">Select</option>
            <option value="I">Semester I</option>
            <option value="II">Semester II</option>
            <option value="III">Semester III</option>
            <option value="IV">Semester IV</option>
            <option value="V">Semester V</option>
            <option value="VI">Semester VI</option>
            <option value="VII">Semester VII</option>
            <option value="VIII">Semester VIII</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="note-branch">Branch</label>
          <select id="note-branch">
            <option value="">Select</option>
            <option value="CSE">CSE</option>
            <option value="INFT">INFT</option>
            <option value="ECE">ECE</option>
            <option value="EEE">EEE</option>
            <option value="ME">ME</option>
            <option value="CE">CE</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="note-tags">Tags</label>
          <input type="text" id="note-tags" placeholder="e.g. unit 3, important">
        </div>
      </div>
      <div class="form-group">
        <label for="note-file">Attach a file</label>
        <input type="file" id="note-file" required>
      </div>
      <button type="submit" class="btn btn-primary" id="btn-upload-note">UPLOAD</button>
    </form>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
