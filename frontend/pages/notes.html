<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Support Hub - Notes</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- Top Navbar -->
  <nav class="navbar">
    <div class="navbar-brand">STUDENT SUPPORT HUB</div>
    <div class="navbar-links">
      <a href="/student-dashboard">Home</a>
      <a href="/alumni">Alumni</a>
      <a href="/grievances">Grievances</a>
      <a href="/notes" class="active">Notes</a>
      <button class="btn-logout" onclick="logout()">Log Out</button>
    </div>
  </nav>

  <div class="page-content">
    <div class="page-header">
      <h1>Search Notes</h1>
    </div>

    <!-- Search & Sort Bar -->
    <div class="search-bar">
      <input type="text" id="notes-search" placeholder="search files" oninput="fetchNotes()">
      <button class="sort-btn" onclick="sortNotes('semester', this)">sort by semester</button>
      <button class="sort-btn" onclick="sortNotes('subject', this)">sort by subject</button>
      <button class="sort-btn active" onclick="sortNotes('time', this)">sort by time</button>
    </div>

    <div id="note-alert"></div>

    <h2 style="font-size: 20px; font-weight: 900; margin-bottom: 16px;">NOTES:</h2>
    <div class="notes-list" id="notes-container">
      <div class="empty-state">
        <div class="icon">&#128218;</div>
        <p>No notes available yet.</p>
      </div>
    </div>

    <div style="margin-top: 24px;">
      <button class="btn btn-primary" onclick="window.location.href='/upload-notes'">UPLOAD</button>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/student.js"></script>
</body>
</html>
